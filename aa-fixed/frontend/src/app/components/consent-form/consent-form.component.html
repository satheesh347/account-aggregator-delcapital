<div class="card">
  <div class="card-header">
    <h2>Initiate Consent Request</h2>
    <p>Customer grants permission to share financial data with Del Capital</p>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="aa-form">

    <!-- Customer Info -->
    <fieldset>
      <legend>Customer Details</legend>
      <div class="form-row">
        <div class="form-group">
          <label>Customer ID <span class="req">*</span></label>
          <input formControlName="customerExternalId" placeholder="e.g. CUST-001" />
          <span class="err" *ngIf="f['customerExternalId'].touched && f['customerExternalId'].errors?.['required']">Required</span>
        </div>
        <div class="form-group">
          <label>Full Name <span class="req">*</span></label>
          <input formControlName="customerName" placeholder="As per bank records" />
          <span class="err" *ngIf="f['customerName'].touched && f['customerName'].errors?.['required']">Required</span>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Mobile <span class="req">*</span></label>
          <input formControlName="mobile" placeholder="10-digit mobile" maxlength="10" />
          <span class="err" *ngIf="f['mobile'].touched && f['mobile'].errors?.['pattern']">Enter a valid 10-digit mobile</span>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input formControlName="email" type="email" placeholder="Optional" />
          <span class="err" *ngIf="f['email'].touched && f['email'].errors?.['email']">Invalid email</span>
        </div>
      </div>
    </fieldset>

    <!-- Consent Config -->
    <fieldset>
      <legend>Consent Configuration</legend>
      <div class="form-row">
        <div class="form-group">
          <label>Purpose <span class="req">*</span></label>
          <select formControlName="purposeCode">
            <option *ngFor="let p of purposeOptions" [value]="p.value">{{ p.label }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Fetch Type</label>
          <select formControlName="fetchType">
            <option value="ONETIME">One-time</option>
            <option value="PERIODIC">Periodic</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Consent Start <span class="req">*</span></label>
          <input type="datetime-local" formControlName="consentStart" />
        </div>
        <div class="form-group">
          <label>Consent Expiry <span class="req">*</span></label>
          <input type="datetime-local" formControlName="consentExpiry" />
        </div>
      </div>

      <!-- FI Types -->
      <div class="form-group full">
        <label>Financial Information Types <span class="req">*</span></label>
        <div class="fi-type-grid">
          <label class="fi-chip" *ngFor="let fi of fiTypeOptions"
                 [class.selected]="isFiTypeSelected(fi.value)">
            <input type="checkbox" [value]="fi.value"
                   [checked]="isFiTypeSelected(fi.value)"
                   (change)="onFiTypeChange(fi.value, $event)" />
            {{ fi.label }}
          </label>
        </div>
      </div>

      <div class="form-group full">
        <label>Redirect URL (after consent signing)</label>
        <input formControlName="redirectUrl" placeholder="https://yourapp.com/consent-callback" />
      </div>
    </fieldset>

    <!-- Error -->
    <div class="alert alert-error" *ngIf="error">{{ error }}</div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        <span *ngIf="!loading">Create Consent & Proceed →</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
    </div>
  </form>
</div>
