spring:
  application:
    name: account-aggregator

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/aa_db}
    username: ${DB_USERNAME:aa_user}
    password: ${DB_PASSWORD:aa_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

# Digio Configuration
digio:
  base-url: ${DIGIO_BASE_URL:https://ext.digio.in:444/fiu_api}
  username: ${DIGIO_USERNAME:ACK25030511375911186LKWJDXERYTXQ}
  password: ${DIGIO_PASSWORD:CGYGOZKNCMHN8I8GSA5HH2DFKRSR732L}
  template-id: ${DIGIO_TEMPLATE_ID:CTMP250909154046573UG2FM8U7NZK36}
  timeout-seconds: 30
  max-retry-attempts: 3

# Resilience4j
resilience4j:
  circuitbreaker:
    instances:
      digioClient:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
  retry:
    instances:
      digioClient:
        max-attempts: 3
        wait-duration: 2s
        retry-exceptions:
          - org.springframework.web.reactive.function.client.WebClientRequestException

# JWT
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-development-only-change-in-prod}
  expiration-ms: 86400000

# CORS
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:4200}

# Logging
logging:
  level:
    com.delcapital.aa: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n"

# Actuator / Observability
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true

# API Docs
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
